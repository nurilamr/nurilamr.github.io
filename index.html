<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtual Mouse AI — Landmark Tangan</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com">
    </script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <!-- MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js">
    </script>
    <style>
        /* ── Cursor kustom ── */
        #cursor {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: radial-gradient(circle, #ff3366, #cc0044);
            position: fixed;
            left: 0;
            top: 0;
            z-index: 999999;
            pointer-events: none;
            display: none;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 30px rgba(255, 51, 102, 0.7), inset 0 0 10px rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.6);
            transition: width 0.15s, height 0.15s, background 0.2s, box-shadow 0.2s;
        }
        #cursor.clicking {
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #4ade80, #22c55e);
            box-shadow: 0 0 40px rgba(74, 222, 128, 0.8);
        }
        #cursor.scrolling {
            width: 32px;
            height: 32px;
            background: radial-gradient(circle, #60a5fa, #3b82f6);
            box-shadow: 0 0 40px rgba(96, 165, 250, 0.7);
        }
        #cursor.photo-mode {
            width: 35px;
            height: 35px;
            background: radial-gradient(circle, #a855f7, #7c3aed);
            box-shadow: 0 0 50px rgba(168, 85, 247, 0.8);
        }

        /* ── Video & overlay ── */
        #video {
            transform: scaleX(-1);
            object-fit: cover;
        }

        #frameOverlay {
            position: absolute;
            inset: 0;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            transform: scaleX(-1);
            display: none;
            border-radius: 15px;
            z-index: 10;
            pointer-events: none;
        }

        /* ── Landmark Canvas ── */
        #landmarkCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            border-radius: 15px;
        }

        /* ── Countdown overlay ── */
        #countdownOverlay {
            position: absolute;
            inset: 0;
            z-index: 20;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
            border-radius: 15px;
            flex-direction: column;
        }
        #countdownOverlay.active {
            display: flex;
        }
        #countdownNumber {
            font-size: 80px;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 60px rgba(168, 85, 247, 0.6), 0 0 120px rgba(168, 85, 247, 0.3);
            animation: pulse 0.8s ease-in-out infinite;
        }
        #countdownLabel {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 8px;
            font-weight: 500;
            letter-spacing: 2px;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.15);
                opacity: 0.7;
            }
        }
        #countdownProgress {
            width: 120px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            margin-top: 16px;
            overflow: hidden;
        }
        #countdownProgress .bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #a855f7, #7c3aed);
            border-radius: 4px;
            transition: width 0.9s linear;
        }

        /* ── Flash effect ── */
        #flashOverlay {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 999999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s;
            display: none;
        }
        #flashOverlay.active {
            display: block;
            opacity: 0.8;
            animation: flash 0.3s ease-out forwards;
        }
        @keyframes flash {
            0% {
                opacity: 0.9;
            }
            100% {
                opacity: 0;
            }
        }

        /* ── Frame slots ── */
        .frame-slot:hover .frame-upload-btn {
            opacity: 1;
        }
        .frame-upload-btn {
            opacity: 0;
            transition: opacity 0.2s;
        }
        .frame-file-input {
            display: none;
        }
        .frame-slot.active .check-mark {
            display: flex;
        }
        .check-mark {
            display: none;
        }

        @media (max-width: 480px) {
            .frame-slot {
                width: 52px !important;
                height: 52px !important;
            }
            .frame-slot .check-mark {
                width: 16px !important;
                height: 16px !important;
                font-size: 8px !important;
            }
            .frame-slot .frame-upload-btn {
                width: 18px !important;
                height: 18px !important;
                font-size: 8px !important;
            }
        }

        /* ── Scroll indicator ── */
        #scrollIndicator {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999998;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 8px 22px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #scrollIndicator.show {
            opacity: 1;
        }
        #scrollIndicator .arrow-up {
            color: #4ade80;
        }
        #scrollIndicator .arrow-down {
            color: #f87171;
        }

        /* ── Gesture hint ── */
        #gestureHint {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999997;
            background: rgba(0, 0, 0, 0.7);
            color: #e2e8f0;
            padding: 7px 20px;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 500;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            letter-spacing: 0.3px;
            text-align: center;
            white-space: nowrap;
        }
        #gestureHint.show {
            opacity: 1;
        }
        #gestureHint .highlight {
            color: #60a5fa;
            font-weight: 700;
        }

        /* ── Legend landmark ── */
        #landmarkLegend {
            position: absolute;
            bottom: 12px;
            right: 16px;
            z-index: 6;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 10px;
            padding: 6px 12px;
            font-size: 10px;
            color: #cbd5e1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        #landmarkLegend .row {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #landmarkLegend .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        /* ── Video wrapper ── */
        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 16 / 9;
            background: #0a0a0a;
            border-radius: 16px;
            overflow: hidden;
        }
        .video-wrapper video,
        .video-wrapper canvas,
        .video-wrapper #frameOverlay,
        .video-wrapper #countdownOverlay {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }
        .video-wrapper video {
            object-fit: cover;
        }
        .video-wrapper #landmarkCanvas {
            width: 100%;
            height: 100%;
        }

        /* ── Photo gallery ── */
        #photoGallery {
            width: 100%;
            max-width: 640px;
            margin-top: 12px;
            background: #0f172a;
            border-radius: 12px;
            border: 1px solid #1e293b;
            padding: 12px;
            min-height: 80px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: flex-start;
        }
        #photoGallery .empty-gallery {
            width: 100%;
            text-align: center;
            color: #475569;
            font-size: 13px;
            padding: 16px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        #photoGallery .empty-gallery i {
            font-size: 28px;
            color: #334155;
        }
        #photoGallery .photo-item {
            width: calc(25% - 8px);
            min-width: 70px;
            aspect-ratio: 4/3;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #1e293b;
            transition: all 0.25s ease;
            position: relative;
            background: #0a0a0a;
        }
        #photoGallery .photo-item:hover {
            border-color: #3b82f6;
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
        }
        #photoGallery .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        #photoGallery .photo-item .photo-index {
            position: absolute;
            bottom: 4px;
            right: 6px;
            background: rgba(0, 0, 0, 0.7);
            color: rgba(255, 255, 255, 0.7);
            font-size: 9px;
            padding: 1px 7px;
            border-radius: 10px;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }
        #photoGallery .photo-item .delete-photo {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.8);
            color: white;
            border: none;
            font-size: 10px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }
        #photoGallery .photo-item:hover .delete-photo {
            display: flex;
        }
        #photoGallery .photo-item .delete-photo:hover {
            background: #ef4444;
            transform: scale(1.15);
        }
        #photoGallery .photo-item .photo-timestamp {
            position: absolute;
            bottom: 4px;
            left: 6px;
            background: rgba(0, 0, 0, 0.6);
            color: rgba(255, 255, 255, 0.6);
            font-size: 8px;
            padding: 1px 6px;
            border-radius: 8px;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }

        @media (max-width: 480px) {
            #photoGallery .photo-item {
                width: calc(33.33% - 8px);
                min-width: 60px;
            }
        }

        /* key btn */
        .key-btn {
            min-width: 32px;
            text-align: center;
        }
        @media (max-width: 480px) {
            .key-btn {
                min-width: 26px;
                font-size: 11px;
                padding: 0 4px;
            }
            #countdownNumber {
                font-size: 56px;
            }
        }

        /* ── Badge foto ── */
        .photo-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.2);
            padding: 2px 12px 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            color: #c084fc;
        }
        .photo-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #a855f7;
            display: inline-block;
            animation: blink 1s ease-in-out infinite;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }
    </style>
</head>

<script>
    // ================================================================
    // 1. DEKLARASI GLOBAL
    // ================================================================

    const cursor = document.getElementById('cursor');
    const video = document.getElementById('video');
    const input = document.getElementById('nameInput');
    const keyboard = document.getElementById('keyboard');
    const frameOverlay = document.getElementById('frameOverlay');
    const frameSlots = document.getElementById('frameSlots');
    const scrollIndicator = document.getElementById('scrollIndicator');
    const scrollText = document.getElementById('scrollText');
    const gestureHint = document.getElementById('gestureHint');
    const landmarkCanvas = document.getElementById('landmarkCanvas');
    const ctx = landmarkCanvas.getContext('2d');
    const countdownOverlay = document.getElementById('countdownOverlay');
    const countdownNumber = document.getElementById('countdownNumber');
    const countdownLabel = document.getElementById('countdownLabel');
    const countdownBar = document.getElementById('countdownBar');
    const photoGallery = document.getElementById('photoGallery');
    const flashOverlay = document.getElementById('flashOverlay');
    const photoCountBadge = document.getElementById('photoCountBadge');

    let camera = null;
    let clickCooldown = false;
    let filterCooldown = false;
    let photoCooldown = false;
    let handsInstance = null;
    let scrollPrevY = null;
    let scrollActive = false;
    let hintTimeout = null;
    let canvasResizeObserver = null;

    // ── Photo state ──
    let photos = [];
    let isCountingDown = false;
    let countdownTimer = null;

    const frameData = [];
    let activeFrameIndex = -1;
    let isRestoring = false;

    // ================================================================
    // 2. STORAGE KEY
    // ================================================================

    const STORAGE_KEY = 'virtual_mouse_frames';
    const ACTIVE_KEY = 'virtual_mouse_active_frame';
    const PHOTOS_KEY = 'virtual_mouse_photos';

    // ================================================================
    // 3. GENERATE DEFAULT FRAMES
    // ================================================================

    function generateDefaultFrames() {
        const colors = [
            { bg: '#1e3a5f', border: '#3b82f6', accent: '#60a5fa' },
            { bg: '#3b1e2e', border: '#ec4899', accent: '#f472b6' },
            { bg: '#1e3b2a', border: '#22c55e', accent: '#4ade80' },
            { bg: '#3b2e1e', border: '#eab308', accent: '#facc15' },
            { bg: '#2e1e3b', border: '#a855f7', accent: '#c084fc' },
        ];

        const frames = [];
        for (let i = 0; i < 5; i++) {
            const c = document.createElement('canvas');
            c.width = 200;
            c.height = 200;
            const ctx2 = c.getContext('2d');
            const col = colors[i % colors.length];

            ctx2.clearRect(0, 0, 200, 200);
            const pad = 16;
            const radius = 28;
            const w = 200 - pad * 2;
            const h = 200 - pad * 2;

            ctx2.shadowColor = 'rgba(0,0,0,0.4)';
            ctx2.shadowBlur = 20;
            ctx2.shadowOffsetX = 0;
            ctx2.shadowOffsetY = 4;

            ctx2.beginPath();
            ctx2.roundRect(pad, pad, w, h, radius);
            ctx2.fillStyle = col.bg;
            ctx2.fill();

            ctx2.shadowColor = 'transparent';
            ctx2.shadowBlur = 0;
            ctx2.lineWidth = 8;
            ctx2.strokeStyle = col.border;
            ctx2.beginPath();
            ctx2.roundRect(pad, pad, w, h, radius);
            ctx2.stroke();

            ctx2.lineWidth = 2;
            ctx2.strokeStyle = col.accent;
            const inset = 10;
            ctx2.beginPath();
            ctx2.roundRect(pad + inset, pad + inset, w - inset * 2, h - inset * 2, radius - 6);
            ctx2.stroke();

            const cornerSize = 22;
            ctx2.lineWidth = 3;
            ctx2.strokeStyle = col.accent;
            const corners = [
                [pad + 6, pad + 6, 1, 1],
                [pad + w - 6, pad + 6, -1, 1],
                [pad + 6, pad + h - 6, 1, -1],
                [pad + w - 6, pad + h - 6, -1, -1]
            ];
            for (const [cx, cy, dx, dy] of corners) {
                ctx2.beginPath();
                ctx2.moveTo(cx + dx * cornerSize, cy);
                ctx2.lineTo(cx, cy);
                ctx2.lineTo(cx, cy + dy * cornerSize);
                ctx2.stroke();
            }

            ctx2.fillStyle = 'rgba(255,255,255,0.2)';
            ctx2.font = '12px sans-serif';
            ctx2.textAlign = 'center';
            ctx2.textBaseline = 'bottom';
            ctx2.fillText(`Frame ${i+1}`, 100, 190);

            frames.push(c.toDataURL('image/png'));
        }
        return frames;
    }

    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (typeof r === 'number') r = [r];
            const radii = r.map(v => Math.min(v, Math.min(w, h) / 2));
            const tl = radii[0] || 0;
            const tr = radii[1] || tl;
            const br = radii[2] || tl;
            const bl = radii[3] || tl;
            this.moveTo(x + tl, y);
            this.arcTo(x + w, y, x + w, y + h, tr);
            this.arcTo(x + w, y + h, x, y + h, br);
            this.arcTo(x, y + h, x, y, bl);
            this.arcTo(x, y, x + w, y, tl);
            this.closePath();
            return this;
        };
    }

    // ================================================================
    // 4. SAVE / LOAD FRAME DATA
    // ================================================================

    function saveFrameData() {
        if (isRestoring) return;
        try {
            const dataURLs = frameData.map(f => f.dataURL || '');
            localStorage.setItem(STORAGE_KEY, JSON.stringify(dataURLs));
            localStorage.setItem(ACTIVE_KEY, String(activeFrameIndex));
        } catch (e) {
            console.warn('Gagal menyimpan frame:', e);
        }
    }

    function loadFrameData() {
        isRestoring = true;
        try {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const dataURLs = JSON.parse(saved);
                if (Array.isArray(dataURLs)) {
                    for (let i = 0; i < Math.min(dataURLs.length, frameData.length); i++) {
                        if (dataURLs[i] && dataURLs[i].startsWith('data:image')) {
                            frameData[i].dataURL = dataURLs[i];
                            const slots = document.querySelectorAll('.frame-slot');
                            if (slots[i]) {
                                const img = slots[i].querySelector('img');
                                if (img) img.src = dataURLs[i];
                            }
                        }
                    }
                }
            }

            const savedIndex = localStorage.getItem(ACTIVE_KEY);
            let idx = 0;
            if (savedIndex !== null && savedIndex !== undefined) {
                const parsed = parseInt(savedIndex, 10);
                if (!isNaN(parsed) && parsed >= 0 && parsed < frameData.length) {
                    idx = parsed;
                }
            }
            selectFrameInternal(idx, true);
        } catch (e) {
            console.warn('Gagal memuat frame:', e);
            selectFrameInternal(0, true);
        } finally {
            isRestoring = false;
        }
    }

    // ================================================================
    // 5. FRAME SLOTS
    // ================================================================

    const defaultFrames = generateDefaultFrames();

    function initFrameSlots() {
        frameSlots.innerHTML = '';
        frameData.length = 0;

        for (let i = 0; i < 5; i++) {
            const dataURL = defaultFrames[i] || '';
            frameData.push({ dataURL, file: null });

            const slot = document.createElement('div');
            slot.className =
                'frame-slot relative w-16 h-16 md:w-20 md:h-20 rounded-xl border-3 border-slate-600 bg-slate-700 cursor-pointer overflow-hidden flex items-center justify-center transition-all hover:border-slate-400 hover:scale-105';
            slot.dataset.index = i;

            const img = document.createElement('img');
            img.src = dataURL;
            img.alt = `Frame ${i+1}`;
            img.draggable = false;
            img.className = 'w-full h-full object-cover rounded-lg';
            slot.appendChild(img);

            const label = document.createElement('span');
            label.className = 'absolute bottom-0.5 right-1 text-[10px] font-bold text-white/60 bg-black/50 px-1.5 rounded';
            label.textContent = `${i+1}`;
            slot.appendChild(label);

            const check = document.createElement('span');
            check.className =
                'check-mark absolute bottom-0.5 left-0.5 w-5 h-5 rounded-full bg-blue-600 text-white text-xs flex items-center justify-center';
            check.innerHTML = '✓';
            slot.appendChild(check);

            const uploadBtn = document.createElement('button');
            uploadBtn.className =
                'frame-upload-btn absolute top-0.5 right-0.5 w-6 h-6 rounded-full bg-black/70 text-white text-xs flex items-center justify-center hover:bg-blue-600 transition-opacity';
            uploadBtn.innerHTML = '<i class="fa-solid fa-upload"></i>';
            uploadBtn.type = 'button';
            slot.appendChild(uploadBtn);

            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'image/*';
            fileInput.className = 'frame-file-input';
            fileInput.dataset.index = i;
            slot.appendChild(fileInput);

            slot.addEventListener('click', function(e) {
                if (e.target.closest('.frame-upload-btn')) return;
                const idx = parseInt(this.dataset.index);
                selectFrame(idx);
            });

            uploadBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                fileInput.click();
            });

            fileInput.addEventListener('change', function(e) {
                const idx = parseInt(this.dataset.index);
                const file = this.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const data = ev.target.result;
                    frameData[idx].dataURL = data;
                    frameData[idx].file = file;
                    const imgEl = slot.querySelector('img');
                    if (imgEl) imgEl.src = data;
                    if (activeFrameIndex === idx) {
                        applyFrameOverlay(data);
                    }
                    saveFrameData();
                    fileInput.value = '';
                };
                reader.readAsDataURL(file);
            });

            frameSlots.appendChild(slot);
        }

        loadFrameData();

        if (activeFrameIndex < 0) {
            selectFrameInternal(0, true);
        }
    }

    // ================================================================
    // 6. FUNGSI FRAME
    // ================================================================

    function selectFrameInternal(index, silent) {
        document.querySelectorAll('.frame-slot').forEach(el => el.classList.remove('active'));
        const slots = document.querySelectorAll('.frame-slot');
        if (slots[index]) {
            slots[index].classList.add('active');
            activeFrameIndex = index;
            const data = frameData[index]?.dataURL;
            if (data) applyFrameOverlay(data);
            else clearFrameOverlay();
            if (!silent) saveFrameData();
        } else {
            activeFrameIndex = -1;
            clearFrameOverlay();
            if (!silent) saveFrameData();
        }
    }

    function selectFrame(index) {
        selectFrameInternal(index, false);
    }

    function applyFrameOverlay(dataURL) {
        if (!frameOverlay) return;
        if (dataURL) {
            frameOverlay.style.backgroundImage = `url(${dataURL})`;
            frameOverlay.style.display = 'block';
        } else {
            clearFrameOverlay();
        }
    }

    function clearFrameOverlay() {
        if (!frameOverlay) return;
        frameOverlay.style.backgroundImage = '';
        frameOverlay.style.display = 'none';
    }

    // ================================================================
    // 7. PHOTO FUNCTIONS
    // ================================================================

    function savePhotos() {
        try {
            localStorage.setItem(PHOTOS_KEY, JSON.stringify(photos));
        } catch (e) {
            console.warn('Gagal menyimpan foto:', e);
        }
    }

    function loadPhotos() {
        try {
            const saved = localStorage.getItem(PHOTOS_KEY);
            if (saved) {
                photos = JSON.parse(saved);
                if (!Array.isArray(photos)) photos = [];
            }
        } catch (e) {
            photos = [];
        }
        renderPhotos();
    }

    function renderPhotos() {
        photoGallery.innerHTML = '';
        if (photos.length === 0) {
            photoGallery.innerHTML = `
                <div class="empty-gallery">
                    <i class="fa-regular fa-images"></i>
                    <span>Belum ada foto. <span class="text-purple-400">🖐️ 5 jari</span> untuk mengambil foto!</span>
                </div>
            `;
        } else {
            // Tampilkan terbaru di depan (reverse order)
            const sorted = [...photos].reverse();
            sorted.forEach((photo, idx) => {
                const div = document.createElement('div');
                div.className = 'photo-item';
                const img = document.createElement('img');
                img.src = photo.dataURL;
                img.alt = `Foto ${photo.id}`;
                div.appendChild(img);

                const index = document.createElement('span');
                index.className = 'photo-index';
                index.textContent = `#${photo.id}`;
                div.appendChild(index);

                const timestamp = document.createElement('span');
                timestamp.className = 'photo-timestamp';
                const date = new Date(photo.timestamp);
                timestamp.textContent = date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                div.appendChild(timestamp);

                const delBtn = document.createElement('button');
                delBtn.className = 'delete-photo';
                delBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
                delBtn.title = 'Hapus foto';
                delBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    deletePhoto(photo.id);
                });
                div.appendChild(delBtn);

                photoGallery.appendChild(div);
            });
        }
        updateBadge();
    }

    function deletePhoto(id) {
        photos = photos.filter(p => p.id !== id);
        savePhotos();
        renderPhotos();
    }

    function clearAllPhotos() {
        if (photos.length === 0) return;
        if (confirm('Hapus semua foto?')) {
            photos = [];
            savePhotos();
            renderPhotos();
            showHint('🗑️ Semua foto dihapus', 800);
        }
    }

    function updateBadge() {
        const count = photos.length;
        photoCountBadge.textContent = count === 0 ? '0 foto' : count === 1 ? '1 foto' : `${count} foto`;
    }

    function capturePhoto() {
        if (!video) return;

        // Ambil frame dari video
        const w = video.videoWidth || 640;
        const h = video.videoHeight || 480;

        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const cctx = canvas.getContext('2d');

        // Mirror horizontal (karena video di-scaleX(-1))
        cctx.translate(w, 0);
        cctx.scale(-1, 1);
        cctx.drawImage(video, 0, 0, w, h);
        cctx.setTransform(1, 0, 0, 1, 0, 0);

        // Gambar frame overlay jika ada
        if (activeFrameIndex >= 0 && frameData[activeFrameIndex]?.dataURL) {
            const img = new Image();
            img.src = frameData[activeFrameIndex].dataURL;
            try {
                cctx.drawImage(img, 0, 0, w, h);
            } catch (e) {
                // skip
            }
        }

        const dataURL = canvas.toDataURL('image/png');

        // Simpan ke array
        const photoObj = {
            id: Date.now(),
            dataURL: dataURL,
            timestamp: Date.now()
        };
        photos.push(photoObj);
        savePhotos();
        renderPhotos();

        // Flash effect
        flashOverlay.classList.remove('active');
        void flashOverlay.offsetWidth;
        flashOverlay.classList.add('active');
        setTimeout(() => {
            flashOverlay.classList.remove('active');
        }, 400);

        showHint('📸 Foto berhasil diambil!', 1200);
        console.log('📸 Foto diambil:', photoObj.id);
    }

    // ── COUNTDOWN ──
    function startPhotoCountdown() {
        if (isCountingDown || photoCooldown) return;
        if (!video) return;

        isCountingDown = true;
        photoCooldown = true;

        let count = 5;
        countdownNumber.textContent = count;
        countdownBar.style.width = '100%';
        countdownOverlay.classList.add('active');
        countdownLabel.textContent = '📸 Siap-siap...';

        showHint('📸 Foto dalam 5 detik!', 2000);

        // Efek kursor
        if (cursor) cursor.classList.add('photo-mode');

        clearInterval(countdownTimer);
        countdownTimer = setInterval(() => {
            count--;
            if (count > 0) {
                countdownNumber.textContent = count;
                countdownBar.style.width = (count / 5 * 100) + '%';
                countdownLabel.textContent = `⏱️ ${count} detik lagi...`;
                // Getaran kecil pada angka
                countdownNumber.style.animation = 'none';
                void countdownNumber.offsetWidth;
                countdownNumber.style.animation = 'pulse 0.6s ease-in-out infinite';
            } else {
                clearInterval(countdownTimer);
                countdownNumber.textContent = '📸';
                countdownLabel.textContent = 'Sekarang!';
                countdownBar.style.width = '0%';

                // Ambil foto
                setTimeout(() => {
                    capturePhoto();
                    countdownOverlay.classList.remove('active');
                    isCountingDown = false;
                    if (cursor) cursor.classList.remove('photo-mode');
                    setTimeout(() => {
                        photoCooldown = false;
                    }, 2000);
                }, 400);
            }
        }, 1000);

        // Reset jika batal (misal tangan menghilang) — ditangani di gesture loop
    }

    function cancelPhotoCountdown() {
        if (isCountingDown) {
            clearInterval(countdownTimer);
            countdownOverlay.classList.remove('active');
            isCountingDown = false;
            if (cursor) cursor.classList.remove('photo-mode');
            // Jangan reset photoCooldown biar ga langsung trigger ulang
            setTimeout(() => {
                photoCooldown = false;
            }, 1500);
            showHint('⏹️ Foto dibatalkan', 800);
        }
    }

    // ================================================================
    // 8. START GAME
    // ================================================================

    function startGame() {
        if (!input) { alert('Input nama tidak tersedia'); return; }
        if (input.value.trim() === '') { alert('Masukkan nama dahulu'); return; }
        window.location.href = 'option.html';

    // 9. KEYBOARD VIRTUAL

    const keys = ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P',
        'A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L',

    ];

    // ================================================================
    // 11. SCROLL INDICATOR
    // ================================================================

    let scrollIndicatorTimeout = null;

    function showScrollIndicator(direction) {

        const arrowUp = scrollIndicator.querySelector('.arrow-up');

    // ================================================================
    // 12. RESIZE CANVAS
    // ================================================================

    function resizeLandmarkCanvas() {
        const container = landmarkCanvas.parentElement;
        const rect = container.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        const w = rect.width;
        const h = rect.height;
        if (w > 0 && h > 0) {
            landmarkCanvas.width = w * dpr;
            landmarkCanvas.height = h * dpr;
            landmarkCanvas.style.width = w + 'px';
            landmarkCanvas.style.height = h + 'px';
            ctx.scale(dpr, dpr);
            landmarkCanvas._logicalWidth = w;
            landmarkCanvas._logicalHeight = h;
        }
    }

    // ================================================================
    // 13. DRAW HAND LANDMARKS
    // ================================================================

    function drawHandLandmarks(landmarks) {
        const w = landmarkCanvas._logicalWidth || landmarkCanvas.width;
        const h = landmarkCanvas._logicalHeight || landmarkCanvas.height;
        if (!w || !h || !landmarks || landmarks.length === 0) {
            ctx.clearRect(0, 0, landmarkCanvas.width, landmarkCanvas.height);
            return;
        }

        ctx.clearRect(0, 0, landmarkCanvas.width, landmarkCanvas.height);

        const connections = [
            [0, 1],
            [1, 2],
            [2, 3],
            [3, 4],
            [0, 5],
            [5, 6],
            [6, 7],
            [7, 8],
            [0, 9],
            [9, 10],
            [10, 11],
            [11, 12],
            [0, 13],
            [13, 14],
            [14, 15],
            [15, 16],
            [0, 17],
            [17, 18],
            [18, 19],
            [19, 20],
            [5, 9],
            [9, 13],
            [13, 17]
        ];

        const mx = (x) => (1 - x) * w;
        const my = (y) => y * h;

        ctx.shadowColor = 'rgba(107, 203, 255, 0.4)';
        ctx.shadowBlur = 12;
        ctx.lineWidth = 2.8;
        ctx.strokeStyle = '#6bcbff';
        ctx.lineCap = 'round';

        for (const [i, j] of connections) {
            const p1 = landmarks[i];
            const p2 = landmarks[j];
            if (!p1 || !p2) continue;
            const x1 = mx(p1.x);
            const y1 = my(p1.y);
            const x2 = mx(p2.x);
            const y2 = my(p2.y);
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
        }

        const fingerColors = [
            '#ff6b6b',
            '#ff9f43',
            '#ffd93d',
            '#6bcb6b',
            '#6bcbff'
        ];

        ctx.shadowColor = 'rgba(255,255,255,0.3)';
        ctx.shadowBlur = 10;

        for (let i = 0; i < landmarks.length; i++) {
            const lm = landmarks[i];
            const x = mx(lm.x);
            const y = my(lm.y);

            let color = '#ff6b6b';
            if (i >= 0 && i <= 4) color = fingerColors[0];
            else if (i >= 5 && i <= 8) color = fingerColors[1];
            else if (i >= 9 && i <= 12) color = fingerColors[2];
            else if (i >= 13 && i <= 16) color = fingerColors[3];
            else if (i >= 17 && i <= 20) color = fingerColors[4];

            const isTip = [4, 8, 12, 16, 20].includes(i);
            const radius = isTip ? 7 : 5;

            ctx.shadowColor = color + '80';
            ctx.shadowBlur = isTip ? 20 : 12;

            ctx.beginPath();
            ctx.arc(x, y, isTip ? 8 : 5.5, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(x, y, isTip ? 4 : 3, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();

            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.lineWidth = 1.2;
            ctx.stroke();

            if (isTip) {
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,0.85)';
                ctx.font = 'bold 9px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                const label = ['IB', 'TJ', 'TG', 'MN', 'KL'][Math.floor(i / 4)];
                ctx.fillText(label, x, y - 12);
            }
        }

        const wrist = landmarks[0];
        if (wrist) {
            const wx = mx(wrist.x);
            const wy = my(wrist.y);
            ctx.shadowColor = 'rgba(255, 215, 0, 0.5)';
            ctx.shadowBlur = 18;
            ctx.beginPath();
            ctx.arc(wx, wy, 7, 0, Math.PI * 2);
            ctx.fillStyle = '#ffd700';
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(wx, wy, 3.5, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.fillStyle = 'rgba(255,215,0,0.7)';
            ctx.font = '8px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText('PG', wx, wy - 10);
        }

        ctx.shadowBlur = 0;
        ctx.shadowColor = 'transparent';
    }

    // ================================================================
    // 14. MEDIAPIPE HANDS — Virtual Mouse + Landmark + Photo
    // ================================================================

    if (video) {
        try {
            handsInstance = new Hands({
                locateFile: function(file) {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }
            });

            handsInstance.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            handsInstance.onResults(function(results) {
                // ── Gambar landmark di canvas ──
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const hand = results.multiHandLandmarks[0];
                    drawHandLandmarks(hand);

                    const indexFinger = hand[8];
                    const x = (1 - indexFinger.x) * window.innerWidth;
                    const y = indexFinger.y * window.innerHeight;

                    if (cursor) {
                        cursor.style.display = 'block';
                        cursor.style.left = x + 'px';
                        cursor.style.top = y + 'px';
                    }

                    let fingerCount = 0;
                    if (hand[8].y < hand[6].y) fingerCount++;
                    if (hand[12].y < hand[10].y) fingerCount++;
                    if (hand[16].y < hand[14].y) fingerCount++;
                    if (hand[20].y < hand[18].y) fingerCount++;
                    if (Math.abs(hand[4].x - hand[2].x) > 0.08) fingerCount++;

                    const thumbTip = hand[4];
                    const indexTip = hand[8];
                    const middleTip = hand[12];

                    const pinchDist = Math.hypot(
                        thumbTip.x - indexTip.x,
                        thumbTip.y - indexTip.y,
                        thumbTip.z - indexTip.z
                    );
                    const isPinch = pinchDist < 0.045;

                    const twoFingerDist = Math.hypot(
                        indexTip.x - middleTip.x,
                        indexTip.y - middleTip.y,
                        indexTip.z - middleTip.z
                    );
                    const isTwoTogether = twoFingerDist < 0.045;

                    // ── KLIK (cubit) ──
                    if (isPinch && !clickCooldown) {
                        clickCooldown = true;
                        cursor.classList.add('clicking');
                        const element = document.elementFromPoint(x, y);
                        if (element && element !== cursor) {
                            element.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true }));
                        }
                        setTimeout(() => {
                            cursor.classList.remove('clicking');
                            clickCooldown = false;
                        }, 400);
                        showHint('✅ Klik!', 500);
                    }

                    // ── SCROLL (2 jari rapat) ──
                    if (isTwoTogether && !isPinch) {
                        const avgY = (indexTip.y + middleTip.y) / 2;
                        if (scrollPrevY !== null) {
                            const deltaY = avgY - scrollPrevY;
                            const threshold = 0.004;
                            if (Math.abs(deltaY) > threshold) {
                                const scrollAmount = deltaY * -450;
                                window.scrollBy(0, scrollAmount);
                                cursor.classList.add('scrolling');
                                if (deltaY < 0) showScrollIndicator('up');
                                else showScrollIndicator('down');
                                if (!scrollActive) {
                                    scrollActive = true;
                                    showHint('✌️ Gulir aktif', 700);
                                }
                            }
                        }
                        scrollPrevY = avgY;
                    } else {
                        scrollActive = false;
                        scrollPrevY = null;
                        cursor.classList.remove('scrolling');
                    }

                    // ── 5 JARI → FOTO dengan countdown ──
                    if (fingerCount >= 5) {
                        // Jika countdown belum aktif dan cooldown selesai
                        if (!isCountingDown && !photoCooldown) {
                            startPhotoCountdown();
                        }
                        // Jika tangan masih terlihat, pertahankan countdown
                    } else {
                        // Jika tangan menghilang dan countdown sedang berjalan, batalkan
                        if (isCountingDown) {
                            cancelPhotoCountdown();
                        }
                    }

                } else {
                    // Tidak ada tangan
                    ctx.clearRect(0, 0, landmarkCanvas.width, landmarkCanvas.height);
                    if (cursor) cursor.style.display = 'none';
                    scrollActive = false;
                    scrollPrevY = null;
                    cursor.classList.remove('scrolling', 'clicking', 'photo-mode');

                    // Batalkan countdown jika tangan hilang
                    if (isCountingDown) {
                        cancelPhotoCountdown();
                    }
                }
            });

            // ── Kamera ──
            camera = new Camera(video, {
                onFrame: async function() {
                    if (handsInstance) await handsInstance.send({ image: video });
                },
                width: 640,
                height: 480
            });
            camera.start();

            setTimeout(() => {
                resizeLandmarkCanvas();
            }, 300);

            if (window.ResizeObserver) {
                canvasResizeObserver = new ResizeObserver(() => {
                    resizeLandmarkCanvas();
                });
                canvasResizeObserver.observe(landmarkCanvas.parentElement);
            }

            window.addEventListener('resize', resizeLandmarkCanvas);

            console.log('✅ Virtual Mouse + Landmark + Photo aktif!');
            console.log('📌 Gestur: cubit=klik, 2 jari rapat=gulir, 5 jari=foto (countdown 5 detik)');

            setTimeout(() => {
                showHint('✋ cubit = klik  ·  ✌️ 2 jari rapat = gulir  ·  🖐️ 5 jari = foto', 3000);
            }, 1500);

        } catch (err) {
            console.error('Gagal inisialisasi MediaPipe:', err);
        }
    }

    // ================================================================
    // 15. PHOTOBOOTH INTEGRATION (untuk kompatibilitas)
    // ================================================================

    const canvasEl = document.getElementById('canvas');
    const gallery = document.getElementById('gallery');
    const overlay = document.getElementById('animalOverlay');
    const countdownEl = document.getElementById('countdown');
    const animalName = document.getElementById('animalName');

    let currentAnimal = 0;
    const animals = [
        { name: 'Cat', img: './assets/cat.png' },
        { name: 'Dog', img: './assets/dog.png' },
        { name: 'Rabbit', img: './assets/rabbit.png' },
        { name: 'Lion', img: './assets/lion.png' },
        { name: 'Panda', img: './assets/panda.png' }
    ];

    const hasPhotobooth = canvasEl && gallery && overlay && countdownEl && animalName;

    if (hasPhotobooth) {
        console.log('Mode Photobooth terdeteksi (kompatibilitas)');
        // Fungsi kosong untuk mencegah error
        window.nextAnimal = function() {
            currentAnimal = (currentAnimal + 1) % animals.length;
            if (overlay && animalName && animals[currentAnimal]) {
                overlay.src = animals[currentAnimal].img;
                animalName.textContent = animals[currentAnimal].name;
            }
        };
        window.startCountdown = function() {
            console.log('📸 Countdown photobooth (dari gesture 5 jari)');
            // Gunakan fungsi capture kita sendiri
            if (typeof capturePhoto === 'function') {
                capturePhoto();
            }
        };
        window.drawFrameOnCanvas = function(ctx, w, h) {
            if (activeFrameIndex >= 0 && frameData[activeFrameIndex]?.dataURL) {
                const img = new Image();
                img.src = frameData[activeFrameIndex].dataURL;
                try {
                    ctx.drawImage(img, 0, 0, w, h);
                } catch (e) {}
            }
        };
        // Update animal
        if (overlay && animalName && animals[0]) {
            overlay.src = animals[0].img;
            animalName.textContent = animals[0].name;
        }
    }

    // ================================================================
    // 16. INISIALISASI
    // ================================================================

    initFrameSlots();
    loadPhotos();

    console.log('✅ Aplikasi siap — Virtual Mouse + Landmark + Photo aktif!');
    console.log('📌 Gestur:');
    console.log('   ✋ cubit (ibu jari + telunjuk) = klik');
    console.log('   ✌️ 2 jari rapat (telunjuk + tengah) = gulir');
    console.log('   🖐️ 5 jari = foto (countdown 5 detik)');
    console.log('📸 Foto tersimpan di localStorage dan muncul di bawah video.');
</script>
