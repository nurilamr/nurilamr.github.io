<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Virtual Mouse Puzzle</title>

    <style>
        /* =========================
           GLOBAL
        ========================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            text-align: center;
            overflow-x: hidden;
            min-height: 100vh;
            background: #0a0f1e;
        }

        /* =========================
           BACKGROUND VIDEO
        ========================= */
        #bgVideo {
            position: fixed;
            top: 0;
            left: 0;
            min-width: 100%;
            min-height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(30%);
        }

        /* =========================
           TITLE
        ========================= */
        h1 {
            margin-top: 20px;
            font-size: 34px;
            letter-spacing: 1px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
        }

        /* =========================
           BUTTONS
        ========================= */
        .controls {
            margin: 16px 0 20px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .controls button,
        .controls a {
            padding: 10px 22px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.25s;
            display: inline-block;
            text-decoration: none;
            font-weight: 600;
        }

        .controls button:hover,
        .controls a:hover {
            transform: scale(1.05);
            background: #1d4ed8;
        }

        .controls .btn-success {
            background: #16a34a;
        }
        .controls .btn-success:hover {
            background: #15803d;
        }
        .controls .btn-danger {
            background: #dc2626;
        }
        .controls .btn-danger:hover {
            background: #b91c1c;
        }
        .controls .btn-purple {
            background: #7c3aed;
        }
        .controls .btn-purple:hover {
            background: #6d28d9;
        }

        /* =========================
           MAIN LAYOUT
        ========================= */
        .game-container {
            display: grid;
            grid-template-columns: 180px 1fr 280px;
            gap: 30px;
            max-width: 1200px;
            margin: 10px auto 40px;
            padding: 0 20px;
            align-items: start;
        }

        /* =========================
           LEFT PANEL
        ========================= */
        .left-panel {
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .left-panel .info-card {
            width: 150px;
            text-align: center;
            padding: 24px 16px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            color: #fff;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .left-panel .info-card span {
            font-size: 16px;
            font-weight: 600;
            opacity: 0.8;
        }

        .left-panel .info-card h3 {
            margin-top: 8px;
            font-size: 44px;
            font-weight: 800;
            color: #60a5fa;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* =========================
           CENTER: PUZZLE
        ========================= */
        .center-area {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #puzzleBoard {
            display: grid;
            gap: 3px;
            padding: 6px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            width: 450px;
            height: 450px;
            position: relative;
        }

        /* Overlay gambar asli (10 jari) */
        #originalImageOverlay {
            position: absolute;
            inset: 0;
            border-radius: 16px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 16px;
            cursor: pointer;
        }
        #originalImageOverlay.show {
            display: flex;
        }
        #originalImageOverlay img {
            max-width: 90%;
            max-height: 85%;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 12px 50px rgba(0, 0, 0, 0.7);
            object-fit: contain;
        }
        #originalImageOverlay .hint-text {
            margin-top: 12px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.5px;
        }
        #originalImageOverlay .close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #originalImageOverlay .close-btn:hover {
            background: rgba(239, 68, 68, 0.6);
            transform: scale(1.1);
        }

        .tile {
            width: 100%;
            height: 100%;
            background-size: 450px 450px;
            background-repeat: no-repeat;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            position: relative;
            background-color: #1e293b;
        }

        .tile:hover {
            transform: scale(1.04);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            z-index: 2;
        }

        .tile.selected {
            border: 3px solid #facc15 !important;
            box-shadow: 0 0 30px rgba(250, 204, 21, 0.5);
            transform: scale(1.05);
            z-index: 3;
        }

        /* =========================
           RIGHT PANEL
        ========================= */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }

        /* Video container with overlay for landmarks - MIRRORED */
        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 260px;
            border-radius: 16px;
            overflow: hidden;
            background: #0a0f1e;
            border: 2px solid rgba(255, 255, 255, 0.20);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .video-wrapper video {
            width: 100%;
            display: block;
            transform: scaleX(-1);
        }

        .video-wrapper canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            transform: scaleX(-1);
        }

        .video-status {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.10);
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 5;
            pointer-events: none;
        }
        .video-status .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 1.2s infinite;
        }
        .video-status .dot.active {
            background: #22c55e;
        }
        .video-status .dot.inactive {
            background: #ef4444;
            animation: none;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(0.7);
            }
        }

        /* =========================
           VIRTUAL CURSOR
        ========================= */
        #virtualCursor {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            display: none;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #dc2626);
            box-shadow: 0 0 25px rgba(220, 38, 38, 0.7), inset 0 -2px 6px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.6);
            transition: width 0.12s, height 0.12s, box-shadow 0.15s;
        }

        #virtualCursor.clicking {
            width: 22px;
            height: 22px;
            box-shadow: 0 0 40px rgba(34, 197, 94, 0.8);
            background: radial-gradient(circle at 30% 30%, #4ade80, #16a34a);
        }

        #virtualCursor.scrolling {
            width: 34px;
            height: 34px;
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.7);
            background: radial-gradient(circle at 30% 30%, #60a5fa, #2563eb);
        }
        #virtualCursor.show-original {
            width: 36px;
            height: 36px;
            box-shadow: 0 0 50px rgba(250, 204, 21, 0.8);
            background: radial-gradient(circle at 30% 30%, #facc15, #f59e0b);
        }

        /* =========================
           WIN POPUP
        ========================= */
        .win-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(16px);
            padding: 40px 48px;
            border-radius: 24px;
            text-align: center;
            transition: 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.20);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
            max-width: 90vw;
        }

        .win-popup.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .win-popup h2 {
            font-size: 32px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #facc15, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: #facc15;
        }

        .win-popup p {
            font-size: 18px;
            color: #cbd5e1;
            margin: 8px 0 20px;
        }

        .win-popup button {
            padding: 12px 36px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .win-popup button:hover {
            transform: scale(1.05);
            background: #1d4ed8;
        }

        /* =========================
           RESPONSIVE
        ========================= */
        @media (max-width: 1024px) {
            .game-container {
                grid-template-columns: 140px 1fr 220px;
                gap: 20px;
            }
            #puzzleBoard {
                width: 380px;
                height: 380px;
            }
            .tile {
                background-size: 380px 380px !important;
            }
        }

        @media (max-width: 820px) {
            .game-container {
                grid-template-columns: 1fr;
                gap: 20px;
                justify-items: center;
            }
            .left-panel {
                order: 2;
                width: 100%;
                display: flex;
                justify-content: center;
            }
            .left-panel .info-card {
                width: 200px;
            }
            .center-area {
                order: 1;
            }
            .right-panel {
                order: 3;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                width: 100%;
            }
            .right-panel .video-wrapper {
                max-width: 220px;
            }
            #puzzleBoard {
                width: 340px;
                height: 340px;
            }
            .tile {
                background-size: 340px 340px !important;
            }
        }

        @media (max-width: 480px) {
            #puzzleBoard {
                width: 280px;
                height: 280px;
                gap: 2px;
                padding: 4px;
            }
            .tile {
                background-size: 280px 280px !important;
                border-radius: 4px;
            }
            .right-panel .video-wrapper {
                max-width: 180px;
            }
            h1 {
                font-size: 24px;
            }
            .controls button,
            .controls a {
                padding: 8px 16px;
                font-size: 13px;
            }
            .win-popup {
                padding: 28px 24px;
            }
            .win-popup h2 {
                font-size: 24px;
            }
            #originalImageOverlay .close-btn {
                top: 8px;
                right: 8px;
                width: 28px;
                height: 28px;
                font-size: 12px;
            }
            #originalImageOverlay .hint-text {
                font-size: 10px;
            }
        }

        /* =========================
           CONFETTI OVERLAY
        ========================= */
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            z-index: 9998;
            pointer-events: none;
            border-radius: 2px;
            animation: confetti-fall linear forwards;
        }

        @keyframes confetti-fall {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0deg) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(110vh) rotate(720deg) scale(0.3);
            }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            padding: 12px 28px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 14px;
            font-weight: 500;
            z-index: 9997;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast .toast-icon {
            margin-right: 10px;
        }
    </style>

</head>

<body>

    <!-- BACKGROUND VIDEO -->
    <video autoplay muted loop id="bgVideo">
        <source src="assets/video/video hewan.mp4" type="video/mp4">
    </video>

    <!-- TITLE -->
    <h1>🧩 Virtual Mouse Puzzle</h1>

    <!-- CONTROL BUTTONS -->
    <div class="controls">
        <a href="option.html" class="btn-purple">← Kembali</a>
        <button onclick="resetPuzzle()" class="btn-danger">↺ Reset</button>
        <button onclick="toggleCamera()" id="cameraToggleBtn" class="btn-purple">📷 Stop Camera</button>
    </div>

    <!-- MAIN GAME LAYOUT -->
    <div class="game-container">

        <!-- LEFT PANEL : LEVEL -->
        <div class="left-panel">
            <div class="info-card">
                <span>⭐ Level</span>
                <h3 id="levelDisplay">1</h3>
                <div style="margin-top:12px;font-size:12px;opacity:0.6;">
                    <span id="levelProgress">1 / 5</span>
                </div>
            </div>
        </div>

        <!-- CENTER : PUZZLE -->
        <div class="center-area">
            <div id="puzzleBoard">
                <!-- Overlay gambar asli (10 jari) -->
                <div id="originalImageOverlay" onclick="closeOriginalOverlay()">
                    <button class="close-btn" onclick="event.stopPropagation(); closeOriginalOverlay();">✕</button>
                    <img id="originalOverlayImg" src="" alt="Gambar asli">
                    <div class="hint-text">🖐️ Klik di mana saja untuk menutup</div>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL : CAMERA ONLY -->
        <div class="right-panel">
            <div class="video-wrapper">
                <video id="camera" autoplay playsinline muted></video>
                <canvas id="handCanvas"></canvas>
                <div class="video-status">
                    <span class="dot active" id="statusDot"></span>
                    <span id="statusText">Hand Tracking</span>
                </div>
            </div>
        </div>

    </div>

    <!-- VIRTUAL CURSOR -->
    <div id="virtualCursor"></div>

    <!-- WIN POPUP -->
    <div id="winPopup" class="win-popup">
        <h2>🎉 Puzzle Completed!</h2>
        <p id="winMessage">Level selesai!</p>
        <button onclick="closeWin()">Lanjut</button>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast">
        <span class="toast-icon">📸</span>
        <span id="toastMessage">Photo loaded!</span>
    </div>

    <!-- SOUND EFFECTS (opsional, jika file tidak ada maka tidak error) -->
    <audio id="moveSound" preload="auto"></audio>
    <audio id="winSound" preload="auto"></audio>

    <!-- MEDIAPIPE -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js">
    </script>

    <script>
        // ================================================================
        // 1. DOM REFS
        // ================================================================

        const video = document.getElementById('camera');
        const handCanvas = document.getElementById('handCanvas');
        const ctx = handCanvas.getContext('2d');
        const cursor = document.getElementById('virtualCursor');
        const board = document.getElementById('puzzleBoard');
        const levelDisplay = document.getElementById('levelDisplay');
        const levelProgress = document.getElementById('levelProgress');
        const winPopup = document.getElementById('winPopup');
        const winMessage = document.getElementById('winMessage');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        const originalOverlay = document.getElementById('originalImageOverlay');
        const originalOverlayImg = document.getElementById('originalOverlayImg');

        // Elemen audio
        const moveSound = document.getElementById('moveSound');
        const winSound = document.getElementById('winSound');

        // Set sumber audio (jika file ada, jika tidak akan diabaikan)
        function setAudioSources() {
            try {
                moveSound.src = 'sounds/move.mp3';
                winSound.src = 'sounds/win.mp3';
                moveSound.load();
                winSound.load();
            } catch (e) {
                // file tidak ada, abaikan
            }
        }

        function playSound(audioElement) {
            if (!audioElement) return;
            try {
                if (audioElement.error) return;
                audioElement.currentTime = 0;
                audioElement.play().catch(() => {});
            } catch (e) {}
        }

        // ================================================================
        // 2. GAME STATE
        // ================================================================

        let level = 1;
        let grid = 3;
        let firstTile = null;
        let isWinPopupOpen = false;
        let cameraRunning = false;
        let cameraInstance = null;
        let handsInstance = null;
        let clickCooldown = false;
        let lastScrollY = 0;
        let scrollAccum = 0;
        const SCROLL_THRESHOLD = 8;
        const PINCH_THRESHOLD = 0.045;
        const TWO_FINGER_THRESHOLD = 0.055;

        let smoothX = 0,
            smoothY = 0;
        const SMOOTH_FACTOR = 0.25;

        // ── URUTAN GAMBAR PER LEVEL (sesuai folder "assets/images puzzle") ──
        const LEVEL_IMAGES = [
            'assets/images puzzle/harimau.jpg',
            'assets/images puzzle/burung.jpg',
            'assets/images puzzle/jerapah.jpg',
            'assets/images puzzle/kuda.jpg',
            'assets/images puzzle/burung.jpg' // Level 5 = burung
        ];

        let currentImageSrc = LEVEL_IMAGES[0];
        let isOriginalOverlayShowing = false;

        // ================================================================
        // 3. FUNGSI BANTU: BUAT PLACEHOLDER DARI CANVAS
        // ================================================================

        function createPlaceholderImage(width, height, label) {
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const c = canvas.getContext('2d');

            const gradient = c.createLinearGradient(0, 0, width, height);
            gradient.addColorStop(0, '#3b82f6');
            gradient.addColorStop(0.5, '#8b5cf6');
            gradient.addColorStop(1, '#3b82f6');
            c.fillStyle = gradient;
            c.fillRect(0, 0, width, height);

            c.strokeStyle = 'rgba(255,255,255,0.15)';
            c.lineWidth = 2;
            for (let i = 0; i < width; i += 40) {
                c.beginPath();
                c.moveTo(i, 0);
                c.lineTo(i, height);
                c.stroke();
            }
            for (let i = 0; i < height; i += 40) {
                c.beginPath();
                c.moveTo(0, i);
                c.lineTo(width, i);
                c.stroke();
            }

            c.fillStyle = 'rgba(255,255,255,0.8)';
            c.font = 'bold 24px sans-serif';
            c.textAlign = 'center';
            c.textBaseline = 'middle';
            c.fillText(label || 'Puzzle', width / 2, height / 2);

            return canvas.toDataURL('image/png');
        }

        // ================================================================
        // 4. PUZZLE ENGINE
        // ================================================================

        function getImageForLevel(lvl) {
            const idx = (lvl - 1) % LEVEL_IMAGES.length;
            currentImageSrc = LEVEL_IMAGES[idx];
            return currentImageSrc;
        }

        function createPuzzle(imageSrc) {
            board.innerHTML = '';
            board.appendChild(originalOverlay);

            const size = 450;
            board.style.width = size + 'px';
            board.style.height = size + 'px';
            board.style.gridTemplateColumns = `repeat(${grid}, 1fr)`;
            board.style.gridTemplateRows = `repeat(${grid}, 1fr)`;

            const total = grid * grid;
            let positions = [];
            for (let i = 0; i < total; i++) positions.push(i);
            for (let i = positions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [positions[i], positions[j]] = [positions[j], positions[i]];
            }

            const tileSize = size / grid;
            currentImageSrc = imageSrc;
            originalOverlayImg.src = imageSrc;

            const placeholder = createPlaceholderImage(size, size, 'Puzzle');

            // Cek apakah gambar bisa dimuat
            const imgTest = new Image();
            imgTest.onload = function() {
                console.log('✅ Gambar berhasil dimuat:', imageSrc);
            };
            imgTest.onerror = function() {
                console.warn('⚠️ Gagal memuat gambar:', imageSrc, '- menggunakan placeholder');
                document.querySelectorAll('.tile').forEach(tile => {
                    const col = parseInt(tile.dataset.col);
                    const row = parseInt(tile.dataset.row);
                    tile.style.backgroundImage = `url(${placeholder})`;
                    tile.style.backgroundSize = `${size}px ${size}px`;
                    tile.style.backgroundPosition = `-${col * tileSize}px -${row * tileSize}px`;
                });
                originalOverlayImg.src = placeholder;
                currentImageSrc = placeholder;
            };
            imgTest.src = imageSrc;

            positions.forEach((pos, idx) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                const col = pos % grid;
                const row = Math.floor(pos / grid);
                tile.dataset.col = col;
                tile.dataset.row = row;

                tile.style.backgroundImage = `url(${imageSrc})`;
                tile.style.backgroundSize = `${size}px ${size}px`;
                tile.style.backgroundPosition = `-${col * tileSize}px -${row * tileSize}px`;
                tile.style.backgroundColor = '#1e293b';

                tile.dataset.correct = pos;
                tile.dataset.index = idx;

                tile.addEventListener('click', () => onTileClick(tile));

                board.appendChild(tile);
            });

            levelDisplay.textContent = level;
            const totalLevels = LEVEL_IMAGES.length;
            levelProgress.textContent = `${Math.min(level, totalLevels)} / ${totalLevels}`;

            firstTile = null;
            closeOriginalOverlay();
        }

        function onTileClick(tile) {
            if (isWinPopupOpen || isOriginalOverlayShowing) return;

            if (!firstTile) {
                firstTile = tile;
                tile.classList.add('selected');
                return;
            }

            if (firstTile === tile) {
                tile.classList.remove('selected');
                firstTile = null;
                return;
            }

            const bg1 = firstTile.style.backgroundPosition;
            const correct1 = firstTile.dataset.correct;
            const bg2 = tile.style.backgroundPosition;
            const correct2 = tile.dataset.correct;

            firstTile.style.backgroundPosition = bg2;
            firstTile.dataset.correct = correct2;
            tile.style.backgroundPosition = bg1;
            tile.dataset.correct = correct1;

            firstTile.classList.remove('selected');
            firstTile = null;

            playSound(moveSound);
            checkWin();
        }

        function checkWin() {
            const tiles = document.querySelectorAll('.tile');
            let win = true;
            tiles.forEach((t, i) => {
                if (parseInt(t.dataset.correct) !== i) win = false;
            });

            if (win && !isWinPopupOpen) {
                isWinPopupOpen = true;
                playSound(winSound);

                const totalLevels = LEVEL_IMAGES.length;
                if (level < totalLevels) {
                    winMessage.textContent = `🎯 Level ${level} selesai! Lanjut ke level ${level + 1}?`;
                    winPopup.querySelector('button').textContent = '🚀 Lanjut';
                } else {
                    winMessage.textContent = '🏆 Semua level selesai! Selamat!';
                    winPopup.querySelector('button').textContent = '🔄 Ulangi';
                }
                winPopup.classList.add('show');
                launchConfetti();
            }
        }

        function nextLevel() {
            const totalLevels = LEVEL_IMAGES.length;
            if (level < totalLevels) {
                level++;
            } else {
                level = 1;
            }
            const img = getImageForLevel(level);
            createPuzzle(img);
            isWinPopupOpen = false;
            winPopup.classList.remove('show');
        }

        function closeWin() {
            if (winPopup.querySelector('button').textContent.includes('Lanjut') ||
                winPopup.querySelector('button').textContent.includes('🚀')) {
                nextLevel();
            } else {
                level = 1;
                const img = getImageForLevel(level);
                createPuzzle(img);
                isWinPopupOpen = false;
                winPopup.classList.remove('show');
            }
        }

        function resetPuzzle() {
            level = 1;
            const img = getImageForLevel(level);
            createPuzzle(img);
            isWinPopupOpen = false;
            winPopup.classList.remove('show');
            closeOriginalOverlay();
            showToast('🔄 Puzzle direset!', '🔄');
        }

        // ================================================================
        // 5. ORIGINAL IMAGE OVERLAY (10 jari)
        // ================================================================

        function showOriginalOverlay() {
            if (isOriginalOverlayShowing) return;
            const src = currentImageSrc || LEVEL_IMAGES[0];
            originalOverlayImg.src = src;
            originalOverlay.classList.add('show');
            isOriginalOverlayShowing = true;
            showToast('🖐️ Gambar asli muncul!', '🖼️');
        }

        function closeOriginalOverlay() {
            originalOverlay.classList.remove('show');
            isOriginalOverlayShowing = false;
        }

        // ================================================================
        // 6. TOAST
        // ================================================================

        let toastTimer = null;

        function showToast(msg, icon = '📸') {
            toastMessage.textContent = msg;
            document.querySelector('.toast .toast-icon').textContent = icon || '📸';
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2800);
        }

        // ================================================================
        // 7. CONFETTI
        // ================================================================

        function launchConfetti() {
            const colors = ['#facc15', '#f87171', '#60a5fa', '#4ade80', '#a78bfa', '#fb923c', '#f472b6'];
            for (let i = 0; i < 80; i++) {
                const el = document.createElement('div');
                el.className = 'confetti-piece';
                el.style.left = Math.random() * 100 + 'vw';
                el.style.top = '-10px';
                el.style.width = (4 + Math.random() * 10) + 'px';
                el.style.height = (4 + Math.random() * 10) + 'px';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
                el.style.animationDelay = (Math.random() * 0.8) + 's';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 4000);
            }
        }

        // ================================================================
        // 8. VIRTUAL MOUSE + HAND LANDMARKS (MIRROR - SINKRON)
        // ================================================================

        function resizeCanvas() {
            const rect = video.getBoundingClientRect();
            if (rect.width === 0 || rect.height === 0) return;
            handCanvas.width = rect.width;
            handCanvas.height = rect.height;
            handCanvas.style.width = '100%';
            handCanvas.style.height = '100%';
        }

        function drawLandmarks(landmarks) {
            const w = handCanvas.width;
            const h = handCanvas.height;
            ctx.clearRect(0, 0, w, h);

            if (!landmarks || landmarks.length === 0) {
                statusDot.className = 'dot inactive';
                statusText.textContent = 'No hand';
                return;
            }

            statusDot.className = 'dot active';
            statusText.textContent = 'Tracking';

            const connections = [
                [0, 1],
                [1, 2],
                [2, 3],
                [3, 4],
                [0, 5],
                [5, 6],
                [6, 7],
                [7, 8],
                [5, 9],
                [9, 10],
                [10, 11],
                [11, 12],
                [9, 13],
                [13, 14],
                [14, 15],
                [15, 16],
                [13, 17],
                [17, 18],
                [18, 19],
                [19, 20],
                [0, 17]
            ];

            ctx.strokeStyle = 'rgba(0, 255, 200, 0.6)';
            ctx.lineWidth = 2;

            for (const [i, j] of connections) {
                const p1 = landmarks[i];
                const p2 = landmarks[j];
                if (p1 && p2) {
                    const x1 = p1.x * w;
                    const y1 = p1.y * h;
                    const x2 = p2.x * w;
                    const y2 = p2.y * h;
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                }
            }

            for (let i = 0; i < landmarks.length; i++) {
                const p = landmarks[i];
                const x = p.x * w;
                const y = p.y * h;
                const radius = i === 4 || i === 8 || i === 12 || i === 16 || i === 20 ? 6 : 4;
                const color = i === 8 ? '#ff6b6b' :
                    i === 4 ? '#facc15' :
                    i === 12 ? '#60a5fa' :
                    i === 16 ? '#4ade80' :
                    i === 20 ? '#a78bfa' :
                    'rgba(255,255,255,0.7)';
                ctx.shadowColor = color + '80';
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, 2 * Math.PI);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            let fingerCount = 0;
            if (landmarks[8].y < landmarks[6].y) fingerCount++;
            if (landmarks[12].y < landmarks[10].y) fingerCount++;
            if (landmarks[16].y < landmarks[14].y) fingerCount++;
            if (landmarks[20].y < landmarks[18].y) fingerCount++;
            if (Math.abs(landmarks[4].x - landmarks[2].x) > 0.08) fingerCount++;

            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.roundRect(8, 8, 70, 26, 14);
            ctx.fill();
            ctx.fillStyle = '#e2e8f0';
            ctx.font = 'bold 13px sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(`✋ ${fingerCount} jari`, 18, 21);
        }

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (typeof r === 'number') r = [r];
                const radii = r.map(v => Math.min(v, Math.min(w, h) / 2));
                const tl = radii[0] || 0,
                    tr = radii[1] || tl,
                    br = radii[2] || tl,
                    bl = radii[3] || tl;
                this.moveTo(x + tl, y);
                this.arcTo(x + w, y, x + w, y + h, tr);
                this.arcTo(x + w, y + h, x, y + h, br);
                this.arcTo(x, y + h, x, y, bl);
                this.arcTo(x, y, x + w, y, tl);
                this.closePath();
                return this;
            };
        }

        function countFingers(hand) {
            let count = 0;
            if (hand[8].y < hand[6].y) count++;
            if (hand[12].y < hand[10].y) count++;
            if (hand[16].y < hand[14].y) count++;
            if (hand[20].y < hand[18].y) count++;
            if (Math.abs(hand[4].x - hand[2].x) > 0.08) count++;
            return count;
        }

        function initHandTracking() {
            if (!video) return;

            try {
                handsInstance = new Hands({
                    locateFile: (file) =>
                        `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
                });

                handsInstance.setOptions({
                    maxNumHands: 2,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.6,
                    minTrackingConfidence: 0.6
                });

                handsInstance.onResults((results) => {
                    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                        drawLandmarks(results.multiHandLandmarks[0]);
                    } else {
                        drawLandmarks(null);
                    }

                    if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                        cursor.style.display = 'none';
                        return;
                    }

                    let totalFingers = 0;
                    for (const hand of results.multiHandLandmarks) {
                        totalFingers += countFingers(hand);
                    }

                    if (totalFingers >= 10) {
                        if (!isOriginalOverlayShowing && !isWinPopupOpen) {
                            showOriginalOverlay();
                            cursor.classList.add('show-original');
                            setTimeout(() => {
                                cursor.classList.remove('show-original');
                            }, 500);
                        }
                        cursor.style.display = 'block';
                        return;
                    } else {
                        if (isOriginalOverlayShowing) {
                            closeOriginalOverlay();
                        }
                        cursor.classList.remove('show-original');
                    }

                    const hand = results.multiHandLandmarks[0];
                    const indexFinger = hand[8];
                    const thumbTip = hand[4];
                    const middleTip = hand[12];

                    const rawX = (1 - indexFinger.x) * window.innerWidth;
                    const rawY = indexFinger.y * window.innerHeight;

                    if (cursor.style.display === 'none') {
                        smoothX = rawX;
                        smoothY = rawY;
                    }
                    smoothX += (rawX - smoothX) * SMOOTH_FACTOR;
                    smoothY += (rawY - smoothY) * SMOOTH_FACTOR;

                    cursor.style.display = 'block';
                    cursor.style.left = smoothX + 'px';
                    cursor.style.top = smoothY + 'px';

                    const pinchDist = Math.hypot(
                        thumbTip.x - indexFinger.x,
                        thumbTip.y - indexFinger.y,
                        thumbTip.z - indexFinger.z
                    );
                    const twoFingerDist = Math.hypot(
                        indexFinger.x - middleTip.x,
                        indexFinger.y - middleTip.y,
                        indexFinger.z - middleTip.z
                    );

                    cursor.classList.remove('clicking', 'scrolling');

                    if (pinchDist < PINCH_THRESHOLD && !clickCooldown) {
                        clickCooldown = true;
                        cursor.classList.add('clicking');
                        const el = document.elementFromPoint(smoothX, smoothY);
                        if (el && el !== cursor) {
                            el.click();
                            if (el.classList.contains('tile')) {
                                el.style.transform = 'scale(0.92)';
                                setTimeout(() => { el.style.transform = ''; }, 150);
                            }
                        }
                        setTimeout(() => { clickCooldown = false; }, 500);
                    } else if (twoFingerDist < TWO_FINGER_THRESHOLD && pinchDist > PINCH_THRESHOLD) {
                        const currentY = indexFinger.y * window.innerHeight;
                        if (lastScrollY === 0) {
                            lastScrollY = currentY;
                            scrollAccum = 0;
                        } else {
                            const delta = lastScrollY - currentY;
                            scrollAccum += delta;
                            if (Math.abs(scrollAccum) >= SCROLL_THRESHOLD) {
                                const amount = scrollAccum * 0.8;
                                window.scrollBy(0, amount);
                                cursor.classList.add('scrolling');
                                scrollAccum = 0;
                            }
                            lastScrollY = currentY;
                        }
                    } else {
                        lastScrollY = 0;
                        scrollAccum = 0;
                    }
                });

                cameraInstance = new Camera(video, {
                    onFrame: async () => {
                        if (handsInstance) await handsInstance.send({ image: video });
                    },
                    width: 640,
                    height: 480
                });
                cameraInstance.start();
                cameraRunning = true;
                document.getElementById('cameraToggleBtn').textContent = '📷 Stop Camera';
                setTimeout(resizeCanvas, 100);

                video.addEventListener('loadedmetadata', resizeCanvas);
                window.addEventListener('resize', resizeCanvas);

                console.log('✅ Hand tracking aktif — Landmark MIRROR (sinkron dengan video)');

            } catch (err) {
                console.error('Gagal inisialisasi MediaPipe:', err);
                statusText.textContent = 'Error';
                statusDot.className = 'dot inactive';
            }
        }

        function toggleCamera() {
            const btn = document.getElementById('cameraToggleBtn');
            if (cameraRunning) {
                if (cameraInstance) {
                    cameraInstance.stop();
                    cameraInstance = null;
                }
                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(t => t.stop());
                    video.srcObject = null;
                }
                cameraRunning = false;
                btn.textContent = '📷 Start Camera';
                statusDot.className = 'dot inactive';
                statusText.textContent = 'Camera off';
                cursor.style.display = 'none';
                ctx.clearRect(0, 0, handCanvas.width, handCanvas.height);
                showToast('📷 Kamera dimatikan', '📷');
            } else {
                initHandTracking();
                btn.textContent = '📷 Stop Camera';
                showToast('📷 Kamera diaktifkan', '📷');
            }
        }

        // ================================================================
        // 9. INISIALISASI
        // ================================================================

        function init() {
            setAudioSources();

            const img = getImageForLevel(level);
            createPuzzle(img);

            setTimeout(() => {
                initHandTracking();
            }, 300);

            showToast('🖼️ Puzzle siap dengan gambar dari folder puzzle', '🧩');
            console.log('🧩 Puzzle siap — cubit=klik, 2 rapat=scroll, 10 jari=lihat asli');
            console.log('🖼️ Urutan gambar per level: harimau, burung, jerapah, kuda, burung');
            console.log('📁 Gambar diambil dari folder "assets/images puzzle"');
        }

        document.addEventListener('DOMContentLoaded', init);

        // ================================================================
        // 10. EXPOSE FUNGSI GLOBAL
        // ================================================================

        window.toggleCamera = toggleCamera;
        window.resetPuzzle = resetPuzzle;
        window.closeWin = closeWin;
        window.nextLevel = nextLevel;
        window.launchConfetti = launchConfetti;
        window.showToast = showToast;
        window.showOriginalOverlay = showOriginalOverlay;
        window.closeOriginalOverlay = closeOriginalOverlay;

        console.log('✅ AI Virtual Mouse Puzzle loaded!');
        console.log('📸 Gestur: cubit=klik | 2 rapat=scroll | 10 jari=lihat asli');
        console.log('🔄 Landmark MIRROR — sinkron sempurna dengan video');
        console.log('🖼️ Urutan gambar: Level 1=harimau, 2=burung, 3=jerapah, 4=kuda, 5=burung');
        console.log('📁 Gambar diambil dari folder "assets/images puzzle" (spasi)');
    </script>

</body>
